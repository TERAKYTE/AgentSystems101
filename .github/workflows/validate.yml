name: Validate Repository

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run repository validation
        run: node scripts/validate_repo.mjs

      - name: Run Markdown lint
        run: npx markdownlint-cli2

      - name: Run curated examples
        run: |
          python examples/minimal-agent-loop.py
          python examples/tool-use-agent.py
          python examples/rag-memory-workflow.py
          python examples/evaluation-harness.py
