name: AgentSystems101 Issue Report
description: Report code, documentation, example, or curriculum issues.
title: "[Issue] Chapter X.X: brief description"
labels: ["documentation", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        Provide enough detail for maintainers to reproduce, verify, and fix the issue.

  - type: input
    id: chapter
    attributes:
      label: Affected Chapter
      description: "Example: Chapter 3.2 or Chapter 6.4"
      placeholder: "Chapter X.X"
    validations:
      required: true

  - type: dropdown
    id: issue_type
    attributes:
      label: Issue Type
      description: Select the closest issue type.
      options:
        - Code error
        - Content error
        - Formatting issue
        - Dependency issue
        - Unclear documentation
        - Broken link or asset
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: Describe the observed issue and the expected behavior.
      placeholder: |
        Example: The code raises an import error when running on Python 3.11.
        Example: Figure 3-5 does not match the surrounding explanation.
        Example: A local Markdown link points to a missing file.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Materials
      description: Include the smallest useful reproduction, logs, screenshots, or environment details.
      placeholder: |
        ```python
        # Paste the smallest code example that reproduces the issue.
        ```

        Error log:
        ```
        Paste the full relevant error log.
        ```

        Environment:
        - Python version:
        - Operating system:
        - Package versions:
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add related issues, pull requests, screenshots, or suggested fixes.

  - type: checkboxes
    id: checks
    attributes:
      label: Verification
      description: Confirm the checks you completed before opening this issue.
      options:
        - label: I have read the relevant chapter documentation.
          required: true
        - label: I have searched existing issues and did not find a duplicate.
          required: true
        - label: I have included reproduction details where applicable.
          required: true
